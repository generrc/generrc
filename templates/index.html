<!DOCTYPE html>
<html>
<head><title>Weather Data</title></head>
<body>
	<h1>Latest Weather</h1>
	<table border="1">
	    <tr><th>Datetime</th><th>Temp</th><th>Pressure</th><th>Humidity</th></tr>
	    {% for row in rows%}
	    <tr>
		    <td>{{  row[0] }}</td>
		    <td>{{  row[1] }}</td>
		    <td>{{  row[2] }}</td>
		    <td>{{  row[3] }}</td>
	    </tr>
	    {% endfor %}
	</table>
</body>
</html>
